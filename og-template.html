<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>OG image template</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Inter:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(900px 500px at 90% -10%, rgba(245,184,0,0.30), transparent 60%),
        radial-gradient(700px 400px at -10% 110%, rgba(46,139,87,0.18), transparent 60%),
        linear-gradient(180deg, #FFF8E7 0%, #FAFAF7 100%);
      color: #0E3B6B;
      position: relative;
    }
    .frame {
      position: absolute; inset: 0;
      display: grid; grid-template-columns: 1fr 380px;
      gap: 30px; padding: 48px 56px 64px;
      align-items: center;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(245,184,0,0.5);
      border-radius: 999px; padding: 10px 20px;
      font-weight: 600; font-size: 22px; color: #0E3B6B;
      box-shadow: 0 4px 10px -4px rgba(14,59,107,0.15);
    }
    .pill .dot { width: 12px; height: 12px; border-radius: 50%; background: #2E8B57; }
    h1 {
      font-family: 'Comfortaa', sans-serif; font-weight: 700;
      font-size: 60px; line-height: 1.05; letter-spacing: -0.01em;
      margin-top: 24px; color: #0E3B6B;
    }
    h1 .accent { color: #D99A00; }
    .slogan {
      margin-top: 24px; font-style: italic;
      font-size: 28px; color: rgba(14,59,107,0.85);
    }
    .brand {
      margin-top: 36px; display: flex; align-items: center; gap: 14px;
      font-family: 'Comfortaa', sans-serif; font-weight: 700; font-size: 32px;
    }
    .brand-logo {
      width: 56px; height: 56px;
      background: #F5B800; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .mascot-wrap {
      position: relative; width: 380px; height: 380px;
      display: flex; align-items: center; justify-content: center;
    }
    .mascot-wrap::before {
      content: ''; position: absolute; inset: 30px;
      background: rgba(245,184,0,0.25); border-radius: 50%; filter: blur(40px);
    }
    .mascot { position: relative; width: 100%; height: 100%; filter: drop-shadow(0 18px 30px rgba(14,59,107,0.2)); }
  </style>
</head>
<body>
  <div class="frame">
    <div>
      <span class="pill"><span class="dot"></span>БО БФ «ВІРИМО – ВСЕ БУДЕ ДОБРЕ» · м. Суми</span>
      <h1>Острів щасливого дитинства, <span class="accent">добрих справ</span> і великих мрій</h1>
      <p class="slogan">«Від маленької дії — до великої мрії»</p>
      <div class="brand">
        <span class="brand-logo">🐝</span>
        <span>Бджолик</span>
      </div>
    </div>
    <div class="mascot-wrap">
      <svg class="mascot" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg" cx="0.4" cy="0.4"><stop offset="0%" stop-color="#FFD84A"/><stop offset="100%" stop-color="#F5B800"/></radialGradient>
          <linearGradient id="wg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/><stop offset="100%" stop-color="#DCEEFF" stop-opacity="0.7"/></linearGradient>
        </defs>
        <ellipse cx="200" cy="370" rx="90" ry="10" fill="#0E3B6B" fill-opacity="0.12"/>
        <ellipse cx="140" cy="140" rx="80" ry="50" fill="url(#wg)" stroke="#0E3B6B" stroke-width="2" transform="rotate(-20 140 140)"/>
        <ellipse cx="260" cy="140" rx="80" ry="50" fill="url(#wg)" stroke="#0E3B6B" stroke-width="2" transform="rotate(20 260 140)"/>
        <ellipse cx="200" cy="230" rx="110" ry="95" fill="url(#bg)" stroke="#0E3B6B" stroke-width="4"/>
        <path d="M120 200 Q200 215 280 200" stroke="#0E3B6B" stroke-width="14" fill="none" stroke-linecap="round"/>
        <path d="M105 240 Q200 260 295 240" stroke="#0E3B6B" stroke-width="14" fill="none" stroke-linecap="round"/>
        <path d="M120 280 Q200 295 280 280" stroke="#0E3B6B" stroke-width="14" fill="none" stroke-linecap="round"/>
        <circle cx="170" cy="200" r="14" fill="#FFFFFF"/>
        <circle cx="230" cy="200" r="14" fill="#FFFFFF"/>
        <circle cx="173" cy="203" r="7" fill="#0E3B6B"/>
        <circle cx="233" cy="203" r="7" fill="#0E3B6B"/>
        <circle cx="175" cy="201" r="2" fill="#FFFFFF"/>
        <circle cx="235" cy="201" r="2" fill="#FFFFFF"/>
        <path d="M175 250 Q200 270 225 250" stroke="#0E3B6B" stroke-width="4" fill="none" stroke-linecap="round"/>
        <ellipse cx="155" cy="245" rx="10" ry="6" fill="#FF8FA3" fill-opacity="0.6"/>
        <ellipse cx="245" cy="245" rx="10" ry="6" fill="#FF8FA3" fill-opacity="0.6"/>
        <g stroke="#0E3B6B" stroke-width="3" stroke-linecap="round" fill="none">
          <path d="M160 130 Q150 110 145 90"/>
          <path d="M240 130 Q250 110 255 90"/>
          <circle cx="145" cy="88" r="6" fill="#0E3B6B"/>
          <circle cx="255" cy="88" r="6" fill="#0E3B6B"/>
        </g>
        <g>
          <circle cx="80"  cy="80"  r="8"  fill="#F5B800" opacity="0.6"/>
          <circle cx="340" cy="100" r="6"  fill="#F5B800" opacity="0.5"/>
          <circle cx="350" cy="280" r="10" fill="#F5B800" opacity="0.5"/>
          <circle cx="60"  cy="300" r="7"  fill="#F5B800" opacity="0.6"/>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
