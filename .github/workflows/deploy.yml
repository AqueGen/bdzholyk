name: Deploy to GitHub Pages

# Auto-runs on push to main. To pause auto-runs without disabling the workflow:
#   gh variable set AUTO_DEPLOY -b false  # pause
#   gh variable set AUTO_DEPLOY -b true   # resume
# A manual run via "Run workflow" always deploys, regardless of the variable.
#
# Add `[skip ci]` to the commit message to skip a single push (GitHub built-in).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - id: decide
        env:
          AUTO_DEPLOY: ${{ vars.AUTO_DEPLOY }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual trigger -> deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${AUTO_DEPLOY,,}" = "false" ]; then
            echo "AUTO_DEPLOY=$AUTO_DEPLOY -> skip auto-deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "AUTO_DEPLOY=${AUTO_DEPLOY:-<unset, defaults to true>} -> deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
