name: Lighthouse CI

# Runs on every pull request to main. To pause auto-runs:
#   gh variable set LIGHTHOUSE_CI -b false
#   gh variable set LIGHTHOUSE_CI -b true  # resume
# Manual "Run workflow" always runs, regardless of the variable.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - id: decide
        env:
          LIGHTHOUSE_CI: ${{ vars.LIGHTHOUSE_CI }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual trigger -> run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${LIGHTHOUSE_CI,,}" = "false" ]; then
            echo "LIGHTHOUSE_CI=$LIGHTHOUSE_CI -> skip."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "LIGHTHOUSE_CI=${LIGHTHOUSE_CI:-<unset, defaults to true>} -> run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  lighthouse:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
